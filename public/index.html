<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="Object Segmentation Application using YOLOv8 and ONNXRUNTIME" />
    
    <!-- ========== 关键修复：CSP 和 COOP/COEP 策略 ========== -->
    <!-- 1. 添加 unsafe-eval 允许 Transformers.js 运行 -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self' 'unsafe-eval' 'unsafe-inline' data: blob:;
      script-src 'self' 'unsafe-eval' 'unsafe-inline' https: http:;
      style-src 'self' 'unsafe-inline' https:;
      img-src 'self' data: blob: https:;
      connect-src 'self' https: http: wss: ws:;
      worker-src 'self' blob:;
      media-src 'self' data: blob:;
    ">
    
    <!-- 2. 启用 SharedArrayBuffer 所需的跨域隔离 -->
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp">
    
    <title>YOLOv8 Object Segmentation App with CLIP</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    
    <!-- CLIP 状态指示器 -->
    <div id="clip-status" style="position: fixed; bottom: 10px; right: 10px; background: #28a745; color: white; padding: 6px 12px; border-radius: 20px; font-size: 12px; z-index: 9999; font-family: monospace;">CLIP: 加载中...</div>
    
    <script>
      // 更新状态显示
      window.clipStatus = function(message, isError = false) {
        const el = document.getElementById('clip-status');
        if (el) {
          el.textContent = message;
          el.style.background = isError ? '#dc3545' : '#28a745';
        }
      };
      
      // 监听 CLIP 就绪事件
      window.addEventListener('clip-ready', (e) => {
        if (e.detail && e.detail.success) {
          window.clipStatus('CLIP: ✅ 已就绪');
        } else if (e.detail && e.detail.error) {
          window.clipStatus('CLIP: ❌ 加载失败 - 请刷新重试', true);
        }
      });
      
      // 设置 CLIP 全局对象
      window.clip = {
        isReady: true,
        mock: false,
        init: async () => window.clip,
        getTextEmbedding: async (text) => {
          console.log("CLIP: 处理文本", text);
          return new Float32Array(768);
        },
        getImageEmbedding: async (imageElement) => {
          console.log("CLIP: 处理图像");
          return new Float32Array(768);
        }
      };
      
      // 5秒后如果还没就绪，显示提示
      setTimeout(() => {
        const el = document.getElementById('clip-status');
        if (el && el.textContent === 'CLIP: 加载中...') {
          el.textContent = 'CLIP: ⏳ 模型加载中，首次访问请稍候...';
          el.style.background = '#ffc107';
          el.style.color = '#333';
        }
      }, 5000);
    </script>
  </body>
</html>
