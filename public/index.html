<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="图像分割应用" />
    <title>YOLOv8 图像分割应用</title>
    <style>
      /* 简单的状态指示器 */
      .clip-status {
        position: fixed;
        bottom: 10px;
        right: 10px;
        background: rgba(0, 128, 0, 0.9);
        color: white;
        padding: 5px 10px;
        border-radius: 5px;
        font-size: 11px;
        z-index: 9999;
        font-family: monospace;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <noscript>您需要启用 JavaScript 才能运行此应用。</noscript>
    <div id="root"></div>
    
    <!-- 模拟 CLIP 状态指示器 -->
    <div class="clip-status" id="clip-status">CLIP: 🟢 演示模式</div>
    
    <!-- 设置全局 mock CLIP 对象，用于 React 组件 -->
    <script>
      // 创建一个全局的模拟 CLIP 对象
      window.clip = {
        isReady: true,
        mock: true,
        init: async () => window.clip,
        getTextEmbedding: async (text) => {
          console.log("Mock CLIP: 处理文本", text);
          return new Float32Array(512);
        },
        getImageEmbedding: async (imageElement) => {
          console.log("Mock CLIP: 处理图像");
          return new Float32Array(512);
        }
      };
      
      // 触发自定义事件，通知 React 应用 CLIP 已就绪
      window.dispatchEvent(new CustomEvent('clip-ready', { 
        detail: { success: true, mock: true, message: "CLIP 演示模式已就绪" }
      }));
      console.log("✅ 模拟 CLIP 全局对象已设置");
    </script>
  </body>
</html>
